<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Кабінет клієнта — ONLINE Service Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="topbar">
  <div class="container nav">
    <a class="brand" href="index.html"><span class="brand-icon">⚙</span><span><b>ONLINE</b><small>Service Manager</small></span></a>
    <nav class="nav-links"><a href="index.html">Головна</a><a href="download.html">Завантажити</a></nav>
  </div>
</header>
<main class="section">
  <div class="container client-card">
    <p class="eyebrow">Кабінет клієнта</p>
    <h1>Перевірка ремонту</h1>
    <form onsubmit="openStatus(event)" class="status-form">
      <input id="repairCode" placeholder="Введіть номер ремонту або QR-токен">
      <button class="btn primary" type="submit">Перевірити</button>
    </form>
    <div class="status-box">
      <p><b>Замовлення:</b> <span id="orderNumber">—</span></p>
      <p><b>Token:</b> <span id="tokenNumber">—</span></p>
      <p><b>Workshop:</b> <span id="workshopId">—</span></p>
      <p><b>Статус:</b> <span id="repairStatus">Очікує дані</span></p>
      <p id="clientNote">Після підключення ONLINE Cloud тут будуть реальні дані ремонту.</p>
    </div>
  </div>
</main>
<script src="script.js"></script>
</body>
</html>
